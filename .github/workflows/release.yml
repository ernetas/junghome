name: Release

# Cut a GitHub release when a vX.Y.Z tag is pushed. HACS installs the latest
# release, so each tag becomes an installable version.
#
#   1. bump "version" in custom_components/junghome/manifest.json
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#
# This workflow fails if the tag doesn't match the manifest version, to keep
# them in sync.
#
# A plain X.Y.Z tag is a normal release. Anything with a suffix (e.g. 1.1.0b1,
# 1.1.0-rc1) is published as a GitHub *pre-release*, which HACS hides from users
# unless they enable "show beta versions" for the repository — so betas don't
# auto-update everyone.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify tag matches manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest="$(python3 -c "import json;print(json.load(open('custom_components/junghome/manifest.json'))['version'])")"
          echo "tag=$tag manifest=$manifest"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Tag ($tag) does not match manifest version ($manifest)."
            exit 1
          fi

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if printf '%s' "$tag" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
          else
            echo "Pre-release version ($tag): marking as pre-release so HACS won't auto-update everyone."
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes --prerelease --latest=false
          fi
