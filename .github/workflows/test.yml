name: Tests

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

permissions: {}

jobs:
  pytest:
    name: "pytest"
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: "pip"

      - name: Install requirements
        run: python3 -m pip install -r requirements_test.txt

      - name: Type check (strict-typing)
        run: python3 -m mypy custom_components/junghome --strict

      - name: Run tests
        run: python3 -m pytest -q --cov=custom_components/junghome --cov-report=term-missing
