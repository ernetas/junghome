blueprint:
  name: JUNG HOME button — single / double / hold
  description: >
    Turn one JUNG HOME rocker button into single-click, double-click and hold
    gestures.

    JUNG rockers only report raw `pressed` / `depressed` (release) events, so
    this blueprint measures the timing between them: a press that is not released
    within the hold time is a *hold*; a press, release and second press within
    the double-click window is a *double*; anything else is a *single*.

    Create one automation per button side. Pick the `event.*` entity for the side
    you want (e.g. `event.living_room_r1_b_up_request_event`) and fill in the
    actions you want for each gesture — leave a gesture empty to ignore it.
  domain: automation
  author: junghome
  source_url: https://github.com/ernetas/junghome/blob/main/blueprints/automation/junghome/button_gestures.yaml
  input:
    button:
      name: Button (event entity)
      description: >
        The JUNG HOME event entity for the button side to watch. Find it under
        Developer Tools → States, filtered by `event.` — its `event_type`
        attribute flips between `pressed` and `depressed` when you press it.
      selector:
        entity:
          filter:
            - domain: event
              integration: junghome
    hold_time:
      name: Hold time
      description: How long the button must be held (without releasing) to count as a hold.
      default: 2
      selector:
        number:
          min: 0.5
          max: 10
          step: 0.5
          unit_of_measurement: seconds
          mode: box
    double_click_window:
      name: Double-click window
      description: >
        After a release, how long to wait for a second press before deciding it
        was a single click. Larger values catch slower double-clicks but make a
        single click feel laggier.
      default: 400
      selector:
        number:
          min: 100
          max: 1000
          step: 50
          unit_of_measurement: milliseconds
          mode: box
    single_action:
      name: Single-click action
      description: Runs on a single press-and-release. Leave empty to ignore.
      default: []
      selector:
        action: {}
    double_action:
      name: Double-click action
      description: Runs when the button is pressed twice within the double-click window. Leave empty to ignore.
      default: []
      selector:
        action: {}
    hold_action:
      name: Hold action
      description: Runs once the button has been held for the hold time. Leave empty to ignore.
      default: []
      selector:
        action: {}

# Ignore re-triggers while we are still measuring a gesture.
mode: single
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input button
    attribute: event_type
    to: pressed

actions:
  # 1) Wait for the release. If it never comes in time → HOLD.
  - wait_for_trigger:
      - trigger: state
        entity_id: !input button
        attribute: event_type
        to: depressed
    timeout:
      seconds: !input hold_time
    continue_on_timeout: true

  - choose:
      # ---- HOLD: release did not arrive within the hold time ----
      - conditions:
          - "{{ wait.trigger is none }}"
        sequence:
          - choose: []
            default: !input hold_action
          # Swallow the eventual release so a long hold isn't mistaken for the
          # start of a new gesture.
          - wait_for_trigger:
              - trigger: state
                entity_id: !input button
                attribute: event_type
                to: depressed
            timeout:
              seconds: 10
            continue_on_timeout: true

    # ---- Released in time: decide SINGLE vs DOUBLE ----
    default:
      # 2) Wait briefly for a second press.
      - wait_for_trigger:
          - trigger: state
            entity_id: !input button
            attribute: event_type
            to: pressed
        timeout:
          milliseconds: !input double_click_window
        continue_on_timeout: true
      - choose:
          # No second press → SINGLE
          - conditions:
              - "{{ wait.trigger is none }}"
            sequence:
              - choose: []
                default: !input single_action
        # Second press arrived → DOUBLE
        default:
          - choose: []
            default: !input double_action
          # Swallow the release of the second press.
          - wait_for_trigger:
              - trigger: state
                entity_id: !input button
                attribute: event_type
                to: depressed
            timeout:
              seconds: !input hold_time
            continue_on_timeout: true
